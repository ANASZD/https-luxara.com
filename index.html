<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Luxara Store</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:black;
color:white;
padding:20px;
text-align:center;
font-size:28px;
letter-spacing:2px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.product{
background:white;
width:220px;
margin:15px;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
border-radius:8px;
}

.price{
color:#27ae60;
font-size:18px;
margin:10px 0;
}

button{
background:black;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#333;
}

footer{
text-align:center;
padding:20px;
background:#111;
color:white;
margin-top:30px;
}

</style>
</head>

<body>

<header>
Luxara
</header>

<div class="products">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Luxury Watch</h3>
<p class="price">$120</p>
<button>Buy Now</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Elegant Bag</h3>
<p class="price">$80</p>
<button>Buy Now</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Fashion Glasses</h3>
<p class="price">$45</p>
<button>Buy Now</button>
</div>

</div>

<footer>
© 2026 Luxara Store
</footer>

</body>
</html>
