<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxara Beauty | الفخامة والأصالة المغربية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        const PHONE_NUMBER = "212781829704"; 

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            gold: '#C5A880',
                            dark: '#1E1E1E',
                            lightBg: '#FCFBF7',
                            whatsapp: '#25D366',
                            whatsappDark: '#128C7E'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #FCFBF7; }
        .hover-lift { transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="overflow-x-hidden text-brand-dark">

    <div class="bg-brand-dark text-white text-center py-2 text-xs font-bold tracking-widest">
        شحن مجاني وسريع لكافة المدن المغربية - الدفع عند الاستلام
    </div>

    <header class="sticky top-0 bg-brand-lightBg/95 backdrop-blur-sm border-b border-gray-100 z-50 py-4">
        <div class="container mx-auto px-4 flex items-center justify-between">
            <h2 class="text-2xl font-bold text-brand-gold">Luxara</h2>
            <a id="wa-header-link" href="#" class="text-brand-whatsapp font-bold flex items-center gap-2 hover:opacity-80 transition">
                تواصل معنا
            </a>
        </div>
    </header>

    <section class="py-12 container mx-auto px-4">
        <div class="grid lg:grid-cols-2 gap-12 items-center">
            <div class="rounded-3xl overflow-hidden shadow-xl hover-lift">
                <img src="Gemini_Generated_Image_oy9i6ioy9i6ioy9i.jpg" alt="Luxara Product" class="w-full h-auto object-cover">
            </div>
            
            <div>
                <h1 class="text-4xl font-extrabold mb-4">Luxara Liquid Blush</h1>
                <p class="text-gray-600 mb-6 text-lg leading-relaxed">بلمسة الفخامة والأصالة من Luxara Beauty. تركيبة فريدة تمنحك إشراقة طبيعية تدوم طوال اليوم.</p>
                <div class="text-3xl font-bold text-brand-gold mb-8">250 DH</div>

                <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-50">
                    <h3 class="font-bold mb-4">طلب سريع (الدفع عند الاستلام)</h3>
                    <input type="text" id="name" placeholder="الاسم الكامل" class="w-full p-4 mb-3 border rounded-xl focus:ring-2 focus:ring-brand-gold outline-none">
                    <input type="tel" id="phone" placeholder="رقم الهاتف" class="w-full p-4 mb-4 border rounded-xl focus:ring-2 focus:ring-brand-gold outline-none">
                    <div id="error-msg" class="text-red-500 text-sm mb-3 hidden">يرجى ملء جميع الحقول المطلوبة</div>
                    <button onclick="sendOrder()" class="w-full py-4 bg-brand-whatsapp text-white font-bold rounded-xl hover:bg-brand-whatsappDark transition shadow-md">
                        أطلب الآن عبر الواتساب
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('wa-header-link').href = `https://wa.me/${PHONE_NUMBER}`;

        function sendOrder() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const errorMsg = document.getElementById('error-msg');
            
            if(!name || !phone) {
                errorMsg.classList.remove('hidden');
                return;
            }
            errorMsg.classList.add('hidden');
            
            const msg = `مرحباً، أريد طلب منتج Luxara Liquid Blush%0Aالاسم: ${name}%0Aالهاتف: ${phone}%0Aطريقة الدفع: عند الاستلام`;
            window.open(`https://wa.me/${PHONE_NUMBER}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
